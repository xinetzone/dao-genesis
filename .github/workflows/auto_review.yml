name: Auto PR Review Loop

on:
  pull_request:
    types:
      - closed

jobs:
  auto-review:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run GitHub Integration Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/github_integration.py

      - name: Commit and push generated review
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .storage/reviews/
          if ! git diff --staged --quiet; then
            git commit -m "docs: add auto-generated PR review record [skip ci]"
            git push
          fi
