name: Memory CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          
      - name: Run unit tests
        run: |
          pytest tests/ -v
          
      - name: Validate memory records
        run: |
          python scripts/validate_reviews.py
          
  build-cache:
    runs-on: ubuntu-latest
    needs: test-and-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Ensure we can push back to the repository
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Build search index
        run: |
          python scripts/build_memory_cache.py
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only commit if there are changes
          if [[ -n "$(git status --porcelain .cache/reviews/search_index.json)" ]]; then
            git add .cache/reviews/search_index.json
            git commit -m "chore(memory): auto-update search index [skip ci]"
            git push
          else
            echo "No changes to search index."
          fi
